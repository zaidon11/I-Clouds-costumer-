<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة مركز الراشد - iCloud Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); }
        body {
            background: linear-gradient(45deg, #0f172a, #1e293b);
            color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; direction: rtl; min-height: 100vh;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; max-width: 1100px; margin: 0 auto; padding: 30px;
        }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--accent); font-size: 26px; }
        
        .stats-row { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-item { background: var(--glass); padding: 15px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); min-width: 150px; text-align: center; }
        .stat-item span { display: block; font-size: 24px; font-weight: bold; color: var(--accent); }

        #generateBtn {
            width: 100%; padding: 18px; background: var(--accent); color: #000;
            border: none; border-radius: 15px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-bottom: 30px;
        }

        .preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .preview-content { background: #1e293b; padding: 30px; border-radius: 25px; text-align: center; width: 350px; border: 1px solid var(--accent); }
        #qrcode { background: white; padding: 10px; border-radius: 15px; display: inline-block; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: rgba(255,255,255,0.05); padding: 15px; color: var(--accent); text-align: right; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .active-badge { color: #10b981; font-weight: bold; }
        .view-btn, .delete-btn { border: none; padding: 8px; border-radius: 8px; cursor: pointer; margin: 2px; }
        .view-btn { background: var(--accent); color: #000; }
        .delete-btn { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="admin-card">
        <header>
            <h1><i class="fa-solid fa-gears"></i> مركز الراشد - لوحة الإدارة</h1>
            <div class="stats-row">
                <div class="stat-item">الكل <span id="totalCards">0</span></div>
                <div class="stat-item">مفعلة ✅ <span id="activeCards">0</span></div>
            </div>
        </header>

        <button id="generateBtn" onclick="handleGenerate()"><i class="fa-solid fa-plus"></i> إنشاء بطاقة ضمان جديدة</button>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الايميل</th>
                        <th>الهاتف</th>
                        <th>تاريخ التفعيل</th>
                        <th>الحالة</th>
                        <th>تحكم</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="previewOverlay" class="preview-overlay">
        <div class="preview-content">
            <h3 id="previewTitle" style="color:white; margin-bottom:15px;"></h3>
            <div id="qrcode"></div>
            <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                <button onclick="downloadQR()" style="background:#10b981; border:none; padding:12px; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">حفظ الباركود صافي</button>
                <button onclick="document.getElementById('previewOverlay').style.display='none'" style="background:#64748b; border:none; padding:10px; border-radius:10px; color:white; cursor:pointer;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpt495yhuoTbjunCLIFCF_8c1NesxZHWs",
            authDomain: "shopweb-3466b.firebaseapp.com",
            databaseURL: "https://shopweb-3466b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shopweb-3466b",
            storageBucket: "shopweb-3466b.firebasestorage.app",
            messagingSenderId: "41811528812",
            appId: "1:41811528812:web:618f240f8106f218a8dc49"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const clientSiteUrl = "https://alrashed-icloud.netlify.app/";

        async function handleGenerate() {
            const boys = ["أحمد", "علي", "سجاد", "حسين", "يوسف", "مصطفى"];
            const fathers = ["كريم", "جاسم", "محمد", "عباس", "رعد"];
            const fName = boys[Math.floor(Math.random()*boys.length)];
            const lName = fathers[Math.floor(Math.random()*fathers.length)];
            const year = Math.floor(Math.random()*(2007-1992+1))+1992;
            
            const newRef = db.ref('icloud_cards').push();
            await newRef.set({
                firstName: fName, lastName: lName, dob: "1/1/"+year,
                email: "user"+Math.floor(Math.random()*99)+year+"@icloud.com",
                password: "AiQ#"+Math.floor(1000+Math.random()*9000),
                status: "pending", phone: "لم يسجل بعد", activationDate: "---"
            });
            openPreview(newRef.key, fName + " " + lName);
        }

        function openPreview(id, name) {
            document.getElementById("previewTitle").innerText = name;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: clientSiteUrl+"?id="+id, width: 250, height: 250 });
            document.getElementById("previewOverlay").style.display = "flex";
            window.currentName = name;
        }

        function downloadQR() {
            const canvas = document.querySelector("#qrcode canvas");
            const link = document.createElement('a');
            link.download = `باركود-${window.currentName}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function loadData() {
            db.ref('icloud_cards').on('value', (snap) => {
                let html = ""; let activeCount = 0;
                document.getElementById("totalCards").innerText = snap.numChildren();
                snap.forEach(c => {
                    const d = c.val();
                    if(d.status === 'active') activeCount++;
                    html = `<tr>
                        <td>${d.firstName} ${d.lastName}</td>
                        <td>${d.email}</td>
                        <td style="color:var(--accent)">${d.phone}</td>
                        <td>${d.activationDate}</td>
                        <td>${d.status === 'active' ? '<span class="active-badge">✅ مفعل</span>' : '⏳ بانتظار الزبون'}</td>
                        <td>
                            <button class="view-btn" onclick="openPreview('${c.key}', '${d.firstName}')"><i class="fa-solid fa-qrcode"></i></button>
                            <button class="delete-btn" onclick="if(prompt('yes للتأكيد')=='yes') db.ref('icloud_cards/${c.key}').remove()"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>` + html;
                });
                document.getElementById("tableBody").innerHTML = html;
                document.getElementById("activeCards").innerText = activeCount;
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>
