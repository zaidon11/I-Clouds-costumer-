<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الراشد - بطاقة iCloud الخاصة بك</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --success: #10b981; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px; direction: rtl; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .client-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px; width: 100%; max-width: 400px; padding: 25px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
        }

        header i { font-size: 45px; color: white; margin-bottom: 10px; }
        header h1 { color: var(--accent); font-size: 24px; margin: 5px 0; }
        
        .warranty-tag {
            background: rgba(0, 210, 255, 0.1); border: 1px dashed var(--accent);
            padding: 10px; border-radius: 15px; margin: 15px 0; font-size: 13px;
        }

        .info-container {
            background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; margin-bottom: 20px;
        }

        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-row:last-child { border: none; }

        .label { font-size: 12px; color: var(--accent); font-weight: bold; }
        .value { font-size: 14px; font-weight: 600; font-family: monospace; }

        .copy-btn {
            background: var(--glass); border: 1px solid var(--accent); color: var(--accent);
            padding: 4px 10px; border-radius: 8px; font-size: 11px; cursor: pointer;
        }

        /* قسم الهاتف */
        .phone-box {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-top: 10px;
        }

        #phoneInput {
            width: 85%; padding: 12px; border-radius: 12px; border: 1px solid var(--accent);
            background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 18px; margin-bottom: 10px;
        }

        .btn-main {
            width: 100%; padding: 14px; border-radius: 15px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px;
        }
        .btn-activate { background: var(--accent); color: #000; }
        .btn-download { background: var(--success); color: white; display: none; }
        .btn-disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        footer { margin-top: 20px; font-size: 11px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="client-card" id="captureArea">
        <header>
            <i class="fa-brands fa-apple"></i>
            <h1>مركز الراشد</h1>
            <div class="warranty-tag">
                <i class="fa-solid fa-shield-check"></i> ضمان 6 أشهر من تاريخ التفعيل
            </div>
        </header>

        <div class="info-container">
            <div class="info-row">
                <span class="label">الاسم:</span>
                <span id="name" class="value">---</span>
            </div>
            <div class="info-row">
                <span class="label">الحساب:</span>
                <span id="email" class="value">---</span>
                <button class="copy-btn" onclick="copyText('email')">نسخ</button>
            </div>
            <div class="info-row">
                <span class="label">الباسورد:</span>
                <span id="password" class="value">---</span>
                <button class="copy-btn" onclick="copyText('password')">نسخ</button>
            </div>
            <div class="info-row">
                <span class="label">المواليد:</span>
                <span id="dob" class="value">---</span>
            </div>
            <div id="finalPhoneRow" class="info-row" style="display: none;">
                <span class="label">رقم الهاتف:</span>
                <span id="displayPhone" class="value" style="color: var(--accent);"></span>
            </div>
        </div>

        <div class="phone-box" id="activationBox">
            <div id="inputGroup">
                <p style="font-size: 12px; margin-bottom: 10px;">سجل رقمك لتفعيل الضمان وحفظ الوصل:</p>
                <input type="tel" id="phoneInput" placeholder="07XXXXXXXXX">
                <button class="btn-main btn-activate" onclick="activateGuarantee()">تفعيل الضمان الآن</button>
            </div>
            <button id="downloadBtn" class="btn-main btn-download" onclick="downloadVoucher()">
                <i class="fa-solid fa-file-arrow-down"></i> حفظ الوصل في الجهاز
            </button>
        </div>

        <footer>جميع الحقوق محفوظة - مركز الراشد 2026</footer>
    </div>

    <script>
        // 1. إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBpt495yhuoTbjunCLIFCF_8c1NesxZHWs",
            authDomain: "shopweb-3466b.firebaseapp.com",
            databaseURL: "https://shopweb-3466b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shopweb-3466b",
            storageBucket: "shopweb-3466b.firebasestorage.app",
            messagingSenderId: "41811528812",
            appId: "1:41811528812:web:618f240f8106f218a8dc49"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id');

        // جلب البيانات
        if (customerId) {
            db.ref('icloud_cards/' + customerId).on('value', (snap) => {
                const d = snap.val();
                if (d) {
                    document.getElementById("name").innerText = d.firstName + " " + d.lastName;
                    document.getElementById("email").innerText = d.email;
                    document.getElementById("password").innerText = d.password;
                    document.getElementById("dob").innerText = d.dob;
                    
                    if(d.status === "active") {
                        showActivatedMode(d.phone);
                    }
                }
            });
        }

        // تفعيل الضمان
        function activateGuarantee() {
            const phone = document.getElementById("phoneInput").value;
            if (phone.length < 10) { alert("يرجى كتابة رقم هاتف صحيح"); return; }

            const confirmAction = confirm("تنبيه: بمجرد الحفظ لا يمكنك تغيير رقم الهاتف نهائياً. هل أنت متأكد؟");
            
            if (confirmAction) {
                const date = new Date();
                const dateStr = date.getDate() + "/" + (date.getMonth()+1) + "/" + date.getFullYear();
                
                db.ref('icloud_cards/' + customerId).update({
                    phone: phone,
                    status: "active",
                    activationDate: dateStr
                }).then(() => {
                    alert("تم تفعيل الضمان بنجاح!");
                    showActivatedMode(phone);
                });
            }
        }

        function showActivatedMode(phone) {
            document.getElementById("inputGroup").style.display = "none";
            document.getElementById("downloadBtn").style.display = "block";
            document.getElementById("finalPhoneRow").style.display = "flex";
            document.getElementById("displayPhone").innerText = phone;
        }

        // حفظ الوصل كصورة
        function downloadVoucher() {
            const area = document.getElementById("captureArea");
            html2canvas(area, { backgroundColor: "#0f172a", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `وصل-مركز-الراشد-${document.getElementById("name").innerText}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        function copyText(id) {
            const txt = document.getElementById(id).innerText;
            navigator.clipboard.writeText(txt).then(() => alert("تم النسخ بنجاح"));
        }
    </script>
</body>
</html>
